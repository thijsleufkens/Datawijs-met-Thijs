services:
  pov-wizard:
    build:
      context: ./apps/pov-wizard
      dockerfile: Dockerfile
    ports:
      - "3334:3000"
    restart: unless-stopped

  hypothese-tracker:
    build:
      context: ./apps/hypothese-tracker
      dockerfile: Dockerfile
    ports:
      - "3331:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    volumes:
      - hypothese-tracker-data:/app/data
    restart: unless-stopped

volumes:
  hypothese-tracker-data:
